<!DOCTYPE html>
<html>
<head>
  <title>News Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
  <h2>📰 NewsFeed</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <!-- 👤 REGISTER -->
  <h2>👤 Register</h2>
  <form id="registerForm">
    <input type="text" id="regUsername" placeholder="Username" required><br><br>
    <input type="password" id="regPassword" placeholder="Password" required><br><br>
    <button type="submit">Register</button>
  </form>

  <hr>

  <!-- 🔐 LOGIN -->
  <div class="card">
    <h3>Login</h3>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required><br><br>
      <input type="password" id="password" placeholder="Password" required><br><br>
      <button type="submit">Login</button>
    </form>
  </div>

  <!-- ➕ POST -->
  <div class="card">
    <h3>Create Post</h3>
    <form id="postForm" enctype="multipart/form-data">
      <input type="text" id="title" placeholder="Title" required><br><br>
      <textarea id="content" placeholder="Content" required></textarea><br><br>
      <input type="file" id="image"><br><br>
      <button type="submit">Post</button>
    </form>
  </div>

  <!-- 📰 FEED -->
  <div id="feed"></div>

</div>

<script src="script.js"></script>
</body>
</html>
